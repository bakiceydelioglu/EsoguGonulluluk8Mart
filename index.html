<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESOGÜ Gönüllülük Kulübü - 8 Mart</title>
    <style>
        :root {
            --purple-dark: #4a148c;
            --purple-main: #7b1fa2;
            --pink: #ff4081;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #fce4ec 0%, #f3e5f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation; 
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            width: 85%;
            max-width: 400px;
            padding: 40px 25px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .logo-area {
            width: 110px;
            height: 110px;
            background: #fff;
            position: absolute;
            top: -55px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 4px solid var(--purple-main);
            overflow: hidden;
        }

        .logo-area img {
            width: 90%; 
            height: 90%;
            object-fit: contain;
        }

        .content {
            margin-top: 30px;
        }

        h2 {
            color: var(--purple-dark);
            font-size: 1.6rem;
            margin: 10px 0;
        }

        .sub-title {
            color: var(--purple-main);
            font-weight: 800;
            margin-bottom: 20px;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .ata-quote {
            background: #fff5f8;
            padding: 25px 15px;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #444;
            margin-bottom: 25px;
            border-left: 5px solid var(--pink);
            font-style: italic;
        }

        .btn-celebrate {
            background: linear-gradient(45deg, var(--purple-main), var(--pink));
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(255, 64, 129, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-celebrate:active {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        
        .flower {
            position: fixed;
            top: -50px;
            z-index: 100;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
            25% { transform: translateY(25vh) rotate(90deg) translateX(15px); }
            50% { transform: translateY(50vh) rotate(180deg) translateX(-15px); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(0); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area">
        <img src="logo1.png" alt="ESOGÜ GK Logo">
    </div>

    <div class="content">
        <h2>8 Mart Dünya Kadınlar Günü</h2>
        <p class="sub-title">ESOGÜ GÖNÜLLÜLÜK KULÜBÜ</p>

        <div class="ata-quote">
            "Dünya yüzünde gördüğümüz her şey kadının eseridir."
            <br><br>
            <strong>- Mustafa Kemal Atatürk</strong>
        </div>

        <button class="btn-celebrate" onclick="startCelebration()">Kutla & Çiçekleri Saç! 🌸</button>
    </div>
</div>

<audio id="celebrationSound" src="alkis.mp3" preload="auto"></audio>

<script>
    function startCelebration() {
       
        const sound = document.getElementById('celebrationSound');
        sound.currentTime = 0;
        sound.play().catch(e => console.log("Ses çalma engellendi: ", e));

        const flowerIcons = ['🌸', '🌹', '🌺', '🌻', '🌷', '🌼', '💖', '✨', '💐'];
        
        
        for (let i = 0; i < 400; i++) {
            setTimeout(() => {
                createFlower(flowerIcons);
            }, i * 10); 
        }
    }

    function createFlower(icons) {
        const f = document.createElement('div');
        f.className = 'flower';
        f.innerText = icons[Math.floor(Math.random() * icons.length)];
        
        const leftPos = Math.random() * 100;
        const size = Math.random() * (40 - 20) + 20; 
        const duration = Math.random() * (4 - 2) + 2;
        
        f.style.left = leftPos + 'vw';
        f.style.fontSize = size + 'px';
        f.style.animationDuration = duration + 's';
        
       
        f.style.filter = `drop-shadow(0 0 5px rgba(255,255,255,0.5)) hue-rotate(${Math.random() * 50}deg)`;

        document.body.appendChild(f);

        setTimeout(() => {
            f.remove();
        }, duration * 1000);
    }
</script>

</body>
</html>
